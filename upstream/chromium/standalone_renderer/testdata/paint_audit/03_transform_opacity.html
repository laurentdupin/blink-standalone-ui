<!doctype html>
<meta charset="utf-8">
<style>
  body {
    margin: 12px;
    font: 16px Arial;
    background: #fafafa;
  }
  .card {
    width: 220px;
    height: 120px;
    padding: 12px;
    overflow: hidden;
    border: 2px solid #336699;
    border-radius: 14px;
    background: linear-gradient(135deg, #eef6ff, #ffffff 65%);
    transform: translate(11px, 7px) rotate(2deg);
    opacity: 0.92;
  }
  .title {
    font-weight: bold;
    text-decoration: underline;
  }
  .pill {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 8px;
    border-radius: 999px;
    background: #336699;
    color: white;
  }
</style>
<div class="card">
  <div class="title">Hello world</div>
  <div class="pill">Blink PaintArtifact</div>
</div>
